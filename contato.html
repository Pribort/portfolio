  <header>
    <div id="header_content" class="flex">
      <div id="titulo">
        <h1>Priscila Bortniuk</h1>

      <div>
        <nav>

  <main>

    <div id="contact" class="flex">
      <form action="#" method="submit" id="formulario">
        <label for="name">Nome: </label>
        <input id="name" type="text" name="name" placeholder="Digite seu nome">
        <span id="txtNome"></span>

        <label for="email">E-mail: </label>
        <input id="email" type="text" name="email" placeholder="Digite seu email">
        <span id="txtEmail"></span>

        <label for="subject">Assunto: </label>
        <input id="subject" type="text" name="subject" placeholder="Digite o título da mensagem">
        <span id="txtSubject"></span>

        <label for="message">Mensagem: </label>
        <textarea name="message" id="message" placeholder="Digite sua mensagem"></textarea>

        <button type="submit">Enviar</button>

      </form>

      <section id="mapa" class="flex_start">

        <div id="endereco">
          <p>Rua Laranjeira, 88.</p>
          <p>Osasco - SP</p>
        </div>

        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3657.8667440813997!2d-46.811316325022005!3d-23.53729476070779!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94ceffc97a7a745b%3A0x8c4b628cabf28fb9!2sR.%20Laranjeira%2C%2088%20-%20Cidade%20das%20Flores%2C%20Osasco%20-%20SP%2C%2006184-020!5e0!3m2!1spt-BR!2sbr!4v1736258621001!5m2!1spt-BR!2sbr" allowfullscreen="" loading="lazy">
        </iframe>

      </section>
    </div>
  </main>
  <footer class="flex">

      <a href="https://www.linkedin.com/in/priscilabortniuk/">
